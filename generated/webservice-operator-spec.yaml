controller:
  enabled: true
  managedResources:
  - Deployment
  - Service
  responsibilities:
  - deploymentName:string - 생성 또는 갱신된 Deployment 이름
  - serviceName:string - 생성 또는 갱신된 Service 이름
  - Controller는 WebService Custom Resource 변경을 감지한다
  - Controller는 Deployment, Service 리소스를 생성/수정/삭제한다
  - Controller는 다음 규칙에 따라 spec 값을 관리 리소스에 반영한다
  - Controller는 Deployment, Service 상태를 조회하여 status를 갱신한다
  fieldMappings:
  - from: spec.image
    to: Deployment container image
  - from: spec.replicas
    to: Deployment.spec.replicas
  - from: spec.port
    to: Deployment containerPort and Service port
  statusRules:
  - Controller는 Deployment, Service 상태를 조회하여 status를 갱신한다
  - status.readyReplicas는 Deployment.status.readyReplicas를 기준으로 갱신한다
