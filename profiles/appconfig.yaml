profileName: appconfig
description: >
  초보 개발자가 이해하기 쉬운 ConfigMap 기반 Operator 예시 profile.
  AppConfig Custom Resource를 감지하고 ConfigMap을 생성하거나, enabled=false일 때
  생성하지 않고 상태를 Disabled로 갱신하는 흐름을 검증하는 데 사용한다.
managedResources:
  - ConfigMap
referencedResources: []
sampleDefaults:
  metadata:
    name: appconfig-sample
  spec:
    appName: demo-app
    configData:
      LOG_LEVEL: info
      FEATURE_FLAG: "true"
    enabled: true
e2e:
  clusterName: appconfig-e2e
  samplePath: config/samples/app_v1alpha1_appconfig.yaml
  customResource:
    resource: appconfig
    crdName: appconfigs.app.beginner.sample.io
  checks:
    - CRD installed
    - AppConfig Custom Resource applied
    - ConfigMap created when enabled is true
    - ConfigMap data matches spec.configData
    - AppConfig status updated
configMapSpecValidation:
  configMapNameTemplate: "{metadata.name}-config"
  checks:
    - name: ConfigMap data
      from: spec.configData
      path: data
    - name: ConfigMap name
      from: metadata.name
      path: metadata.name
