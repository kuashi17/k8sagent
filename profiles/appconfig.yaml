profileName: appconfig
description: >
  내부 회귀 테스트와 kind lifecycle 검증에 사용하는 단순 ConfigMap 기반 fixture profile.
  실제 제품 방향은 AppConfig 전용 생성기가 아니라, 사용자의 자연어 요구사항에 맞춰
  Operator 개발 흐름을 구성하는 범용 Agent core이다.
managedResources:
  - ConfigMap
referencedResources: []
sampleDefaults:
  metadata:
    name: appconfig-sample
  spec:
    appName: demo-app
    configData:
      LOG_LEVEL: info
      FEATURE_FLAG: "true"
    enabled: true
e2e:
  clusterName: appconfig-e2e
  samplePath: config/samples/app_v1alpha1_appconfig.yaml
  customResource:
    resource: appconfig
    crdName: appconfigs.app.beginner.sample.io
  checks:
    - CRD installed
    - AppConfig Custom Resource applied
    - ConfigMap created when enabled is true
    - ConfigMap data matches spec.configData
    - AppConfig status updated
configMapSpecValidation:
  configMapNameTemplate: "{metadata.name}-config"
  checks:
    - name: ConfigMap data
      from: spec.configData
      path: data
    - name: ConfigMap name
      from: metadata.name
      path: metadata.name
kindDeployment:
  enabled: true
  runner: kind_deployment_runner
  project: workspace/generated-operators/app-config-operator
  clusterName: appconfig-deploy
  image: app-config-operator:kind
  sample: workspace/generated-operators/app-config-operator/config/samples/app_v1alpha1_appconfig.yaml
  namespace: app-config-operator-system
  deployment: app-config-operator-controller-manager
  sampleName: appconfig-sample
  configMapName: appconfig-sample-config
  skipPrepareController: true
  skipPrevalidation: true
  lifecycleChecks:
    - create
    - update
    - disabled
    - delete
    - restore
