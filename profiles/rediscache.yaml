profileName: rediscache
description: >
  RedisCache Operator 예시 profile placeholder.
  RedisCache는 StatefulSet과 Service를 관리하고 Pod와 PersistentVolumeClaim을 참조하는
  캐시 워크로드 검증 profile로 확장할 수 있다.
managedResources:
  - StatefulSet
  - Service
referencedResources:
  - Pod
  - PersistentVolumeClaim
sampleDefaults:
  metadata:
    name: rediscache-sample
  spec:
    size: 1
    image: redis:7
    storageSize: 1Gi
e2e:
  clusterName: rediscache-e2e
  samplePath: config/samples/cache_v1alpha1_rediscache.yaml
  checks:
    - CRD installed
    - RedisCache Custom Resource applied
    - StatefulSet created
    - Service created
    - Pod readiness observed
    - RedisCache status updated
statefulSetSpecValidation:
  statefulSetNameTemplate: "{metadata.name}"
  serviceNameTemplate: "{metadata.name}"
  checks:
    - name: replicas
      from: spec.size
      path: spec.replicas
    - name: container image
      from: spec.image
      path: spec.template.spec.containers[0].image
    - name: storage request
      from: spec.storageSize
      path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
kindDeployment:
  enabled: true
  runner: kind_deployment_runner
  project: workspace/redis-cache-operator
  clusterName: rediscache-deploy
  image: redis-cache-operator:kind
  sample: workspace/redis-cache-operator/config/samples/cache_v1alpha1_rediscache.yaml
  namespace: redis-cache-operator-system
  deployment: redis-cache-operator-controller-manager
  validator: managed-resources
  validatorConfig:
    resource: rediscache
    sampleName: rediscache-sample
    managedResources:
      - resource: statefulset
        name: rediscache-sample
        deletionPolicy: garbage-collect
      - resource: service
        name: rediscache-sample
        deletionPolicy: garbage-collect
    updateSpec:
      size: 2
    updateAssertions:
      - resource: statefulset
        name: rediscache-sample
        path: spec.replicas
        equals: 2
    acceptedStatusPhases:
      - Pending
      - Progressing
      - Ready
    rbacChecks:
      - verb: update
        resource: rediscaches/status
        apiGroup: cache.sample.io
      - verb: create
        resource: statefulsets
        apiGroup: apps
      - verb: create
        resource: services
  skipPrepareController: true
  skipPrevalidation: false
