version: 1
behaviorPrimitives:
  - name: container-env
    activationFields: [env]
    mutations:
      - source: env
        target: "{container}.env"
        transform: env-map

  - name: resource-limits
    activationFields: [resourceLimits, cpuLimit, memoryLimit]
    mutations:
      - source: resourceLimits
        target: "{container}.resources.limits"
        transform: string-map
      - source: cpuLimit
        target: "{container}.resources.limits.cpu"
      - source: memoryLimit
        target: "{container}.resources.limits.memory"

  - name: pvc-volume
    activationFields: [pvcName]
    mutations:
      - literal: workload-data
        target: "{podSpec}.volumes[0].name"
      - source: pvcName
        target: "{podSpec}.volumes[0].persistentVolumeClaim.claimName"
      - literal: workload-data
        target: "{container}.volumeMounts[0].name"
      - source: mountPath
        defaultValue: /workspace
        target: "{container}.volumeMounts[0].mountPath"

  - name: health-probe
    activationFields: [healthPath, healthPort]
    mutations:
      - source: healthPath
        defaultValue: /healthz
        target: "{container}.livenessProbe.httpGet.path"
      - source: healthPort
        defaultValue: 8080
        target: "{container}.livenessProbe.httpGet.port"
        transform: int64

  - name: readiness-probe
    activationFields: [readinessPath, readinessPort]
    mutations:
      - source: readinessPath
        defaultValue: /readyz
        target: "{container}.readinessProbe.httpGet.path"
      - source: readinessPort
        defaultValue: 8080
        target: "{container}.readinessProbe.httpGet.port"
        transform: int64

resources:
  - kind: ConfigMap
    apiVersion: v1
    suffix: config
    nameFields: [configMapName, name]
    disableField: enabled
    fieldMappings:
      - {source: configData, target: data, transform: string-map}
      - {source: data, target: data, transform: string-map}
    statusMappings:
      - {field: configMapName, source: metadata.name, resourceName: true}

  - kind: Secret
    apiVersion: v1
    suffix: secret
    nameFields: [secretName, targetName, name]
    disableField: enabled
    fieldMappings:
      - source: data
        target: stringData
        transform: string-map
        assertionPath: data
        assertionTransform: base64-string-map
      - source: secretData
        target: stringData
        transform: string-map
        assertionPath: data
        assertionTransform: base64-string-map
    statusMappings:
      - {field: secretName, source: metadata.name, resourceName: true}

  - kind: PersistentVolumeClaim
    aliases: [PVC]
    apiVersion: v1
    suffix: pvc
    nameFields: [claimName, pvcName]
    fieldMappings:
      - {source: storageSize, target: spec.resources.requests.storage}
      - {source: size, target: spec.resources.requests.storage}
      - source: storageClassName
        target: spec.storageClassName
        mutability: immutable
        updatePolicy: recreate
      - source: accessModes
        target: spec.accessModes
        transform: string-slice
        mutability: immutable
        updatePolicy: recreate
    statusMappings:
      - {field: claimName, source: metadata.name, resourceName: true}

  - kind: CronJob
    apiVersion: batch/v1
    suffix: cronjob
    nameFields: [cronJobName]
    behaviorBindings:
      - primitive: container-env
        paths: &cronPaths
          container: spec.jobTemplate.spec.template.spec.containers[0]
          podSpec: spec.jobTemplate.spec.template.spec
      - {primitive: resource-limits, paths: *cronPaths}
      - {primitive: pvc-volume, paths: *cronPaths}
      - {primitive: health-probe, paths: *cronPaths}
      - {primitive: readiness-probe, paths: *cronPaths}
    baseObject:
      spec:
        schedule: "*/5 * * * *"
        suspend: true
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: task
                    image: nginx:latest
                    command: []
    fieldMappings:
      - {source: schedule, target: spec.schedule}
      - {source: image, target: "spec.jobTemplate.spec.template.spec.containers[0].image"}
      - {source: command, target: "spec.jobTemplate.spec.template.spec.containers[0].command", transform: string-slice}
      - {source: suspend, target: spec.suspend}
    statusMappings:
      - {field: cronJobName, source: metadata.name, resourceName: true}
      - {field: lastScheduleTime, source: status.lastScheduleTime}

  - kind: Deployment
    apiVersion: apps/v1
    suffix: deployment
    nameFields: [deploymentName, appName]
    behaviorBindings:
      - primitive: container-env
        paths: &deploymentPaths
          container: spec.template.spec.containers[0]
          podSpec: spec.template.spec
      - {primitive: resource-limits, paths: *deploymentPaths}
      - {primitive: pvc-volume, paths: *deploymentPaths}
      - {primitive: health-probe, paths: *deploymentPaths}
      - {primitive: readiness-probe, paths: *deploymentPaths}
    baseObject:
      spec:
        replicas: 1
        selector:
          matchLabels: {}
        template:
          metadata:
            labels: {}
          spec:
            containers:
              - name: application
                image: nginx:latest
                ports:
                  - containerPort: 1
    labelPaths:
      - spec.selector.matchLabels
      - spec.template.metadata.labels
    fieldMappings:
      - {source: image, target: "spec.template.spec.containers[0].image"}
      - {source: replicas, target: spec.replicas, transform: int64}
      - {source: size, target: spec.replicas, transform: int64}
      - {source: port, target: "spec.template.spec.containers[0].ports[0].containerPort", transform: int64}
      - {source: containerPort, target: "spec.template.spec.containers[0].ports[0].containerPort", transform: int64}
    statusMappings:
      - {field: deploymentName, source: metadata.name, resourceName: true}
      - {field: readyReplicas, source: status.readyReplicas}

  - kind: StatefulSet
    apiVersion: apps/v1
    suffix: statefulset
    dependencyKind: Service
    dependencyVariable: serviceName
    dependencyTargetPath: spec.serviceName
    nameFields: [statefulSetName, appName, cacheName]
    behaviorBindings:
      - primitive: container-env
        paths: &statefulSetPaths
          container: spec.template.spec.containers[0]
          podSpec: spec.template.spec
      - {primitive: resource-limits, paths: *statefulSetPaths}
      - {primitive: health-probe, paths: *statefulSetPaths}
      - {primitive: readiness-probe, paths: *statefulSetPaths}
    baseObject:
      spec:
        replicas: 1
        selector:
          matchLabels: {}
        template:
          metadata:
            labels: {}
          spec:
            containers:
              - name: application
                image: nginx:latest
    conditionalObjects:
      - whenSource: spec.storageSize
        object:
          spec:
            template:
              spec:
                containers:
                  - name: application
                    image: nginx:latest
                    volumeMounts:
                      - name: data
                        mountPath: /data
            volumeClaimTemplates:
              - metadata:
                  name: data
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 1Gi
    labelPaths:
      - spec.selector.matchLabels
      - spec.template.metadata.labels
    fieldMappings:
      - {source: image, target: "spec.template.spec.containers[0].image"}
      - {source: replicas, target: spec.replicas, transform: int64}
      - {source: size, target: spec.replicas, transform: int64}
      - {source: port, target: "spec.template.spec.containers[0].ports[0].containerPort", transform: int64}
      - {source: storageSize, target: "spec.volumeClaimTemplates[0].spec.resources.requests.storage"}
    statusMappings:
      - {field: readyReplicas, source: status.readyReplicas}

  - kind: Service
    apiVersion: v1
    suffix: service
    nameFields: [serviceName, appName]
    baseObject:
      spec:
        selector: {}
        ports:
          - port: 1
            targetPort: 1
    labelPaths:
      - spec.selector
    fieldMappings:
      - {source: port, target: "spec.ports[0].port", transform: int64}
      - {source: port, target: "spec.ports[0].targetPort", transform: int64}
    statusMappings:
      - {field: serviceName, source: metadata.name, resourceName: true}

  - kind: Namespace
    apiVersion: v1
    suffix: namespace
    scope: Cluster
    strategy: patch-existing
    ownership: none
    deletionPolicy: retain
    nameFields: [namespaceName]
    fieldMappings:
      - {source: labels, target: metadata.labels, transform: merge-string-map}
    statusMappings:
      - {field: observedNamespace, source: metadata.name, resourceName: true}

  - kind: DaemonSet
    apiVersion: apps/v1
    suffix: daemonset
    nameFields: [daemonSetName, appName]
    behaviorBindings:
      - primitive: container-env
        paths: &daemonSetPaths
          container: spec.template.spec.containers[0]
          podSpec: spec.template.spec
      - {primitive: resource-limits, paths: *daemonSetPaths}
      - {primitive: pvc-volume, paths: *daemonSetPaths}
      - {primitive: health-probe, paths: *daemonSetPaths}
      - {primitive: readiness-probe, paths: *daemonSetPaths}
    baseObject:
      spec:
        selector:
          matchLabels: {}
        template:
          metadata:
            labels: {}
          spec:
            containers:
              - name: application
                image: nginx:latest
    labelPaths:
      - spec.selector.matchLabels
      - spec.template.metadata.labels
    fieldMappings:
      - {source: image, target: "spec.template.spec.containers[0].image"}
      - {source: port, target: "spec.template.spec.containers[0].ports[0].containerPort", transform: int64}
    statusMappings:
      - {field: readyReplicas, source: status.numberReady}

  - kind: Pod
    apiVersion: v1
    suffix: pod
    strategy: read-only
    ownership: none
    deletionPolicy: retain

  - kind: Job
    apiVersion: batch/v1
    suffix: job
    strategy: read-only
    ownership: none
    deletionPolicy: retain
