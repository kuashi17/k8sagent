name: full-kind-regression

on:
  workflow_dispatch:

jobs:
  full:
    runs-on: [self-hosted, local-llm, docker, kind]
    env:
      GOCACHE: /tmp/k8sagent-go-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: .tools
          key: local-k8s-tools-${{ runner.os }}-${{ hashFiles('scripts/install-local-tools.sh') }}
      - name: Install pinned local tools
        run: |
          bash ./scripts/install-local-tools.sh
          echo "$PWD/.tools/bin" >> "$GITHUB_PATH"
      - uses: actions/cache@v5
        with:
          path: |
            /tmp/k8sagent-go-build
            ~/go/pkg/mod
          key: full-go-${{ runner.os }}-${{ hashFiles('agent/tools/scaffold_runner.py', 'agent/evaluation/profileless_compile_runner.py') }}
          restore-keys: full-go-${{ runner.os }}-
      - uses: actions/cache/restore@v5
        with:
          path: .ci-history/full.json
          key: performance-full-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: performance-full-
      - uses: actions/cache/restore@v5
        with:
          path: .cache/agent/llm-plans
          key: agent-llm-plans-full-${{ hashFiles('agent/llm/prompts.py', 'agent/llm_cache.py', 'agent/tools/resource_catalog.py') }}-${{ github.run_id }}
          restore-keys: agent-llm-plans-full-
      - run: docker info
      - run: python3 -m py_compile $(git ls-files '*.py')
      - run: python3 scripts/run-regression-tests.py --suite full --output-dir evaluation/results/regression/ci-full --history-file .ci-history/full.json
      - run: test -f evaluation/results/regression/ci-full/profileless-compile/profileless-compile-results.json
      - run: test -f evaluation/results/regression/ci-full/profileless-kind/profileless-kind-results.json
      - run: test -f evaluation/results/regression/ci-full/final-evaluation.json
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: .ci-history/full.json
          key: performance-full-${{ github.run_id }}-${{ github.run_attempt }}
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: .cache/agent/llm-plans
          key: agent-llm-plans-full-${{ hashFiles('agent/llm/prompts.py', 'agent/llm_cache.py', 'agent/tools/resource_catalog.py') }}-${{ github.run_id }}
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: full-regression-${{ github.run_id }}
          path: evaluation/results/regression/ci-full/
          retention-days: 30
      - name: Clean up ephemeral kind clusters
        if: always()
        run: |
          if ! command -v kind >/dev/null 2>&1; then
            echo "kind is unavailable; no ephemeral clusters were created."
            exit 0
          fi
          for cluster in trainingjob-e2e trainingjob-deploy rediscache-e2e rediscache-deploy profileless-matrix; do
            kind delete cluster --name "$cluster"
          done
