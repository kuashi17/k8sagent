name: quick-regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python3 -m py_compile $(git ls-files '*.py')
      - run: python3 scripts/run-regression-tests.py --suite quick --output-dir evaluation/results/regression/ci-quick
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quick-regression
          path: evaluation/results/regression/ci-quick/
