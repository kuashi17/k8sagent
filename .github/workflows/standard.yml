name: standard-local-llm

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 18 * * 0"

jobs:
  standard:
    runs-on: [self-hosted, local-llm]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache/restore@v5
        with:
          path: .ci-history/standard.json
          key: performance-standard-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: performance-standard-
      - uses: actions/cache/restore@v5
        with:
          path: .cache/agent/llm-plans
          key: agent-llm-plans-standard-${{ hashFiles('agent/llm/prompts.py', 'agent/llm_cache.py', 'agent/tools/resource_catalog.py') }}-${{ github.run_id }}
          restore-keys: agent-llm-plans-standard-
      - run: python3 -m py_compile $(git ls-files '*.py')
      - run: python3 scripts/run-regression-tests.py --suite standard --output-dir evaluation/results/regression/ci-standard --history-file .ci-history/standard.json
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: .ci-history/standard.json
          key: performance-standard-${{ github.run_id }}-${{ github.run_attempt }}
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: .cache/agent/llm-plans
          key: agent-llm-plans-standard-${{ hashFiles('agent/llm/prompts.py', 'agent/llm_cache.py', 'agent/tools/resource_catalog.py') }}-${{ github.run_id }}
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: standard-regression-${{ github.run_id }}
          path: evaluation/results/regression/ci-standard/
          retention-days: 30
