name: standard-local-llm

on:
  workflow_dispatch:

jobs:
  standard:
    runs-on: [self-hosted, local-llm]
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/run-regression-tests.py --suite standard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: standard-regression
          path: evaluation/results/regression/
